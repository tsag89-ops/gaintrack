name: Security Quality Operations

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  masvs-cadence-gate:
    name: MASVS Cadence Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate MASVS cadence artifact
        run: |
          test -f test_reports/security/masvs-cadence.md
          grep -qi "storage" test_reports/security/masvs-cadence.md
          grep -qi "authentication" test_reports/security/masvs-cadence.md
          grep -qi "network" test_reports/security/masvs-cadence.md
          grep -qi "privacy" test_reports/security/masvs-cadence.md

  policy-regression-gate:
    name: Policy Regression Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.3.5

      - name: Run policy regression tests
        run: |
          mkdir -p test_reports/pytest
          pytest tests/test_policy_regression_gates.py -q --junitxml=test_reports/pytest/policy-regression-gate.xml

      - name: Upload policy gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-regression-gate
          path: test_reports/pytest/policy-regression-gate.xml

  frontend-sca:
    name: Frontend SCA Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run npm audit (high severity gate)
        run: npm audit --omit=dev --audit-level=high

  backend-sca:
    name: Backend SCA Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.7.3

      - name: Run pip-audit on backend requirements
        run: |
          mkdir -p test_reports/secrets
          pip-audit -r backend/requirements.txt --format json --output test_reports/secrets/pip-audit-report.json

      - name: Upload backend SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pip-audit-report
          path: test_reports/secrets/pip-audit-report.json
