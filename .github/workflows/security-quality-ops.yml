name: Security Quality Operations

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan-gate:
    name: Secret Scan Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_CONFIG: .gitleaks.toml

  masvs-cadence-gate:
    name: MASVS Cadence Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate MASVS cadence artifact
        run: |
          test -f test_reports/security/masvs-cadence.md
          grep -qi "storage" test_reports/security/masvs-cadence.md
          grep -qi "authentication" test_reports/security/masvs-cadence.md
          grep -qi "network" test_reports/security/masvs-cadence.md
          grep -qi "privacy" test_reports/security/masvs-cadence.md

  policy-regression-gate:
    name: Policy Regression Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.3.5

      - name: Run policy regression tests
        run: |
          mkdir -p test_reports/pytest
          pytest tests/test_policy_regression_gates.py -q --junitxml=test_reports/pytest/policy-regression-gate.xml

      - name: Upload policy gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-regression-gate
          path: test_reports/pytest/policy-regression-gate.xml

  frontend-sca:
    name: Frontend SCA Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run npm audit (high severity gate)
        run: npm audit --omit=dev --audit-level=high

  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend lint (advisory)
        id: frontend_lint
        continue-on-error: true
        run: |
          mkdir -p ../test_reports/frontend
          npm run lint > ../test_reports/frontend/lint-report.txt 2>&1

      - name: Upload frontend lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-report
          path: test_reports/frontend/lint-report.txt

      - name: Warn on lint debt
        if: steps.frontend_lint.outcome == 'failure'
        run: |
          echo "Frontend lint reported existing issues (advisory mode)."
          echo "TypeScript typecheck remains blocking."

      - name: Run TypeScript typecheck
        run: npx tsc --noEmit

  backend-health-gate:
    name: Backend Health Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check backend health endpoint (if configured)
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          BACKEND_HEALTHCHECK_URL=$(echo "$VARS_JSON" | jq -r '.BACKEND_HEALTHCHECK_URL // empty')

          if [ -z "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "BACKEND_HEALTHCHECK_URL variable is not set; skipping health check gate."
            exit 0
          fi

          status=$(curl -sS -o /tmp/health-response.json -w "%{http_code}" "$BACKEND_HEALTHCHECK_URL")
          echo "Health endpoint status: $status"
          cat /tmp/health-response.json || true

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Backend health gate failed"
            exit 1
          fi

  backend-sca:
    name: Backend SCA Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.7.3

      - name: Run pip-audit on backend requirements
        run: |
          mkdir -p test_reports/secrets
          pip-audit -r backend/requirements.txt --format json --output test_reports/secrets/pip-audit-report.json

      - name: Upload backend SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pip-audit-report
          path: test_reports/secrets/pip-audit-report.json

  native-patch-integrity:
    name: Native Patch Integrity Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install frontend dependencies and apply patches
        run: npm install

      - name: Verify patches directory is not empty
        id: patch_check
        run: |
          count=$(ls patches/*.patch 2>/dev/null | wc -l)
          echo "Patch files found: $count"
          if [ "$count" -eq 0 ]; then
            echo "No patch files found in frontend/patches/ - skipping Kotlin compile check."
          fi

      - name: Ensure Android google-services file for prebuild
        if: hashFiles('frontend/patches/*.patch') != ''
        run: |
          if [ ! -f google-services.json ]; then
            cat > google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-placeholder",
              "storage_bucket": "ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.tsag89ops.gaintrack"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "CI_PLACEHOLDER_KEY"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Android project (prebuild)
        if: hashFiles('frontend/patches/*.patch') != ''
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: "1"

      - name: Compile Android Kotlin sources
        if: hashFiles('frontend/patches/*.patch') != ''
        working-directory: frontend/android
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee ../../test_reports/kotlin-compile.txt

      - name: Upload Kotlin compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-compile-log
          path: test_reports/kotlin-compile.txt
