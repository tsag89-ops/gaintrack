name: Backend Auth Entitlement Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-backend-auth-entitlement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.110.1 \
            starlette==0.37.2 \
            pydantic==2.12.5 \
            python-jose==3.5.0 \
            httpx==0.28.1 \
            motor==3.3.1 \
            pymongo==4.5.0 \
            python-dotenv==1.2.1 \
            pytest==8.3.5 \
            pytest-asyncio==0.23.8

      - name: Run auth and entitlement tests
        run: |
          mkdir -p test_reports/pytest
          pytest tests/test_backend_auth_entitlement.py -q --junitxml=test_reports/pytest/backend-auth-entitlement.xml

      - name: Upload pytest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-auth-entitlement-pytest
          path: test_reports/pytest/backend-auth-entitlement.xml
