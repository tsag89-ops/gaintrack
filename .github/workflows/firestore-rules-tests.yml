name: Firestore Rules Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  firestore-rules-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dev dependencies
        run: npm install

      - name: Run Firestore rules tests in emulator
        run: npm run test:firestore:rules:emulator

      - name: Upload Firestore rules test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-rules-tests
          path: |
            frontend/firebase-debug.log
            frontend/firestore-debug.log
